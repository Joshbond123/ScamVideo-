name: ffmpeg-render
run-name: Render ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      supabase_url:
        required: true
        type: string
      supabase_service_role_key:
        required: true
        type: string
      bucket:
        required: true
        type: string
      audio_path:
        required: true
        type: string
      image_paths_json:
        required: true
        type: string
      subtitle_events_json:
        required: true
        type: string
      output_path:
        required: true
        type: string
      voice_duration_sec:
        required: true
        type: string
  repository_dispatch:
    types:
      - render_video

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq python3

      - name: Download assets + build subtitle and concat manifests
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url || inputs.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key || inputs.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket || inputs.bucket }}
          AUDIO_PATH: ${{ github.event.inputs.audio_path || github.event.client_payload.audio_path || inputs.audio_path }}
          IMAGE_PATHS_JSON: ${{ github.event.inputs.image_paths_json || github.event.client_payload.image_paths_json || inputs.image_paths_json }}
          SUBTITLE_EVENTS_JSON: ${{ github.event.inputs.subtitle_events_json || github.event.client_payload.subtitle_events_json || inputs.subtitle_events_json }}
          VOICE_DURATION_SEC: ${{ github.event.inputs.voice_duration_sec || github.event.client_payload.voice_duration_sec || inputs.voice_duration_sec }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          base = os.environ['SUPABASE_URL'].rstrip('/')
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          bucket = os.environ['BUCKET']
          audio_path = os.environ['AUDIO_PATH']
          image_paths = json.loads(os.environ['IMAGE_PATHS_JSON'])
          subtitle_events = json.loads(os.environ['SUBTITLE_EVENTS_JSON'])
          voice_duration = max(1.0, float(os.environ.get('VOICE_DURATION_SEC') or 1.0))

          if not image_paths:
              raise SystemExit('image_paths_json must include at least one scene image')

          def dl(remote, local):
              req = urllib.request.Request(f"{base}/storage/v1/object/{bucket}/{remote}", headers={"apikey": key, "Authorization": f"Bearer {key}"})
              with urllib.request.urlopen(req, timeout=120) as r:
                  data = r.read()
              with open(local, 'wb') as f:
                  f.write(data)

          dl(audio_path, 'audio.mp3')
          for idx, p in enumerate(image_paths):
              dl(p, f'scene_{idx}.png')

          def ts(v):
              v = max(0.0, float(v))
              h = int(v // 3600)
              m = int((v % 3600) // 60)
              s = int(v % 60)
              ms = int(round((v - int(v)) * 1000))
              return f"{h:02}:{m:02}:{s:02},{ms:03}"

          blocks = []
          for ev in subtitle_events:
              start = float(ev.get('start', 0) or 0)
              end = float(ev.get('end', 0) or 0)
              if end <= start:
                  end = start + 1.2
              txt = ' '.join(str(ev.get('text', '')).replace('\n', ' ').split())
              if txt:
                  blocks.append((start, end, txt))

          if not blocks:
              blocks = [(0.0, 2.0, 'Stay alert and avoid crypto scams')]

          with open('subtitles.srt', 'w', encoding='utf-8', newline='\n') as f:
              for i, (start, end, txt) in enumerate(blocks, 1):
                  f.write(f"{i}\n{ts(start)} --> {ts(end)}\n{txt}\n\n")

          scene_duration = voice_duration / len(image_paths)
          with open('images.txt', 'w', encoding='utf-8', newline='\n') as f:
              for idx in range(len(image_paths)):
                  f.write(f"file '{os.path.abspath(f'scene_{idx}.png')}'\n")
                  f.write(f"duration {scene_duration:.6f}\n")
              f.write(f"file '{os.path.abspath(f'scene_{len(image_paths)-1}.png')}'\n")

          with open('scene_count.txt', 'w', encoding='utf-8') as f:
              f.write(str(len(image_paths)))
          PY

      - name: Render MP4 with FFmpeg
        run: |
          set -euo pipefail
          ffmpeg -y -hide_banner -loglevel error \
            -f concat -safe 0 -i images.txt \
            -i audio.mp3 \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2,subtitles=subtitles.srt:force_style='FontName=Arial,FontSize=22,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1,Outline=2,Shadow=0,Alignment=2,MarginV=120'" \
            -r 30 -pix_fmt yuv420p \
            -c:v libx264 -preset medium -movflags +faststart \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -shortest render.mp4

          test -s render.mp4
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 render.mp4 > render_duration.txt
          ffprobe -v error -select_streams v:0 -show_entries stream=nb_frames -of default=noprint_wrappers=1:nokey=1 render.mp4 > video_frames.txt
          ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 render.mp4 > audio_codec.txt
          python3 - <<'PY'
import pathlib
scenes=int(pathlib.Path('scene_count.txt').read_text().strip() or '0')
d=float(pathlib.Path('render_duration.txt').read_text().strip() or '0')
f=int(pathlib.Path('video_frames.txt').read_text().strip() or '0')
a=pathlib.Path('audio_codec.txt').read_text().strip()
if scenes < 2:
    raise SystemExit('Expected multiple scenes')
if d < 2.0:
    raise SystemExit('Rendered duration unexpectedly short')
if f < 20:
    raise SystemExit('Rendered video has too few frames')
if not a:
    raise SystemExit('Rendered video missing audio stream')
print('Render output validation passed')
PY

      - name: Upload rendered video to Supabase storage
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url || inputs.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key || inputs.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket || inputs.bucket }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path || github.event.client_payload.output_path || inputs.output_path }}
        run: |
          set -euo pipefail
          UPLOAD_RESPONSE=$(curl -sS --fail-with-body -X POST "${SUPABASE_URL}/storage/v1/object/${BUCKET}/${OUTPUT_PATH}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: video/mp4" \
            --data-binary @render.mp4)

          echo "${UPLOAD_RESPONSE}" | jq -c '.'
