name: moviepy-render
run-name: Render ${{ github.event.inputs.job_id || github.event.client_payload.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Render job id
        required: true
        type: string
      supabase_url:
        description: Supabase project URL
        required: true
        type: string
      supabase_service_role_key:
        description: Supabase service role key
        required: true
        type: string
      bucket:
        description: Supabase storage bucket
        required: true
        type: string
      audio_path:
        description: Audio object path
        required: true
        type: string
      image_paths_json:
        description: JSON array of image object paths
        required: true
        type: string
      subtitle_events_json:
        description: JSON subtitle events
        required: true
        type: string
      output_path:
        description: Output object path
        required: true
        type: string
      voice_duration_sec:
        description: Voice duration in seconds
        required: true
        type: string
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install moviepy==1.0.3 numpy

      - name: Download assets + build subtitle and concat manifests
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket }}
          AUDIO_PATH: ${{ github.event.inputs.audio_path || github.event.client_payload.audio_path }}
          IMAGE_PATHS_JSON: ${{ github.event.inputs.image_paths_json || github.event.client_payload.image_paths_json }}
          SUBTITLE_EVENTS_JSON: ${{ github.event.inputs.subtitle_events_json || github.event.client_payload.subtitle_events_json }}
          VOICE_DURATION_SEC: ${{ github.event.inputs.voice_duration_sec || github.event.client_payload.voice_duration_sec }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          base = os.environ['SUPABASE_URL'].rstrip('/')
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          bucket = os.environ['BUCKET']
          audio_path = os.environ['AUDIO_PATH']
          image_paths = json.loads(os.environ['IMAGE_PATHS_JSON'])
          subtitle_events = json.loads(os.environ['SUBTITLE_EVENTS_JSON'])
          voice_duration = max(1.0, float(os.environ.get('VOICE_DURATION_SEC') or 1.0))

          if not image_paths:
              raise SystemExit('image_paths_json must include at least one scene image')

          def dl(remote, local):
              req = urllib.request.Request(
                  f"{base}/storage/v1/object/{bucket}/{remote}",
                  headers={"apikey": key, "Authorization": f"Bearer {key}"},
              )
              with urllib.request.urlopen(req, timeout=120) as r:
                  data = r.read()
              with open(local, 'wb') as f:
                  f.write(data)

          dl(audio_path, 'audio.mp3')
          for idx, p in enumerate(image_paths):
              dl(p, f'scene_{idx}.png')


          blocks = []
          for ev in subtitle_events:
              start = float(ev.get('start', 0) or 0)
              end = float(ev.get('end', 0) or 0)
              txt = ' '.join(str(ev.get('text', '')).replace('\n', ' ').split())
              if txt:
                  blocks.append((start, end, txt))

          blocks.sort(key=lambda x: x[0])
          normalized = []
          cursor = 0.0
          for start, end, txt in blocks:
              start = max(0.0, start, cursor)
              end = max(start + 0.05, end)
              normalized.append((start, end, txt))
              cursor = end

          if not normalized:
              normalized = [(0.0, 2.0, 'Stay alert and avoid crypto scams')]

          def ass_ts(v):
              v = max(0.0, float(v))
              h = int(v // 3600)
              m = int((v % 3600) // 60)
              s = int(v % 60)
              cs_total = int(round((v - int(v)) * 100))
              carry_s, cs = divmod(cs_total, 100)
              s = s + carry_s
              carry_m, s = divmod(s, 60)
              m = m + carry_m
              carry_h, m = divmod(m, 60)
              h = h + carry_h
              return f"{h}:{m:02}:{s:02}.{cs:02}"

          ass_lines = [
              '[Script Info]',
              'ScriptType: v4.00+',
              'PlayResX: 1080',
              'PlayResY: 1920',
              '',
              '[V4+ Styles]',
              'Format: Name,Fontname,Fontsize,PrimaryColour,SecondaryColour,OutlineColour,BackColour,Bold,Italic,Underline,StrikeOut,ScaleX,ScaleY,Spacing,Angle,BorderStyle,Outline,Shadow,Alignment,MarginL,MarginR,MarginV,Encoding',
              'Style: Viral,Arial Black,26,&H00FFFF00,&H0000FFFF,&H00000000,&H64000000,1,0,0,0,100,100,0,0,3,2,0,2,60,60,180,1',
              '',
              '[Events]',
              'Format: Layer,Start,End,Style,Name,MarginL,MarginR,MarginV,Effect,Text',
          ]
          for start, end, txt in normalized:
              safe = txt.replace('{', '(').replace('}', ')')
              ass_lines.append(f"Dialogue: 0,{ass_ts(start)},{ass_ts(end)},Viral,,0,0,0,,{safe}")

          with open('subtitles.ass', 'w', encoding='utf-8', newline='\n') as f:
              f.write('\n'.join(ass_lines) + '\n')

          scene_duration = voice_duration / len(image_paths)
          with open('images.txt', 'w', encoding='utf-8', newline='\n') as f:
              for idx in range(len(image_paths)):
                  f.write(f"file '{os.path.abspath(f'scene_{idx}.png')}'\n")
                  f.write(f"duration {scene_duration:.6f}\n")
              f.write(f"file '{os.path.abspath(f'scene_{len(image_paths)-1}.png')}'\n")

          with open('scene_count.txt', 'w', encoding='utf-8') as f:
              f.write(str(len(image_paths)))
          PY

      - name: Verify ffmpeg has libass subtitle support
        run: |
          ffmpeg -hide_banner -filters | grep -E '\b(subtitles|ass)\b'

      - name: Render MP4 with MoviePy
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from moviepy.editor import AudioFileClip, ImageClip, concatenate_videoclips

          with open('images.txt', 'r', encoding='utf-8') as f:
              lines = [line.strip() for line in f if line.strip()]

          scene_files = [line.split("'", 2)[1] for line in lines if line.startswith('file ')]
          if len(scene_files) > 1:
              # concat manifest repeats the final frame once; drop duplicate for clip assembly
              scene_files = scene_files[:-1]

          with open('scene_count.txt', 'r', encoding='utf-8') as f:
              declared_count = int(f.read().strip() or '0')

          if declared_count and len(scene_files) != declared_count:
              raise RuntimeError(f'image manifest mismatch declared={declared_count} parsed={len(scene_files)}')

          audio = AudioFileClip('audio.mp3')
          duration = float(audio.duration or 1.0)
          scene_duration = max(0.5, duration / max(1, len(scene_files)))

          clips = [ImageClip(path).set_duration(scene_duration).resize((1080, 1920)).set_fps(30) for path in scene_files]
          if not clips:
              raise RuntimeError('No scene images found for render')

          video = concatenate_videoclips(clips, method='compose').set_audio(audio)
          video = video.set_duration(duration)
          video.write_videofile(
              'render.mp4',
              codec='libx264',
              audio_codec='aac',
              fps=30,
              preset='medium',
              threads=4,
              ffmpeg_params=['-pix_fmt', 'yuv420p', '-movflags', '+faststart'],
              verbose=False,
              logger=None,
          )

          video.close()
          audio.close()
          for clip in clips:
              clip.close()
          PY

          test -s render.mp4

      - name: Upload rendered video to Supabase storage
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path || github.event.client_payload.output_path }}
        run: |
          curl -sS --fail-with-body -X POST "${SUPABASE_URL}/storage/v1/object/${BUCKET}/${OUTPUT_PATH}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: video/mp4" \
            --data-binary @render.mp4
