name: moviepy-render
run-name: Render ${{ github.event.inputs.job_id || github.event.client_payload.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Render job id
        required: true
        type: string
      supabase_url:
        description: Supabase project URL
        required: true
        type: string
      supabase_service_role_key:
        description: Supabase service role key
        required: true
        type: string
      bucket:
        description: Supabase storage bucket
        required: true
        type: string
      audio_path:
        description: Audio object path
        required: true
        type: string
      image_paths_json:
        description: JSON array of image object paths
        required: true
        type: string
      subtitle_events_json:
        description: JSON subtitle events
        required: true
        type: string
      output_path:
        description: Output object path
        required: true
        type: string
      voice_duration_sec:
        description: Voice duration in seconds
        required: true
        type: string
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install moviepy pillow imageio imageio-ffmpeg numpy requests

      - name: Download render assets and build subtitles.srt
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket }}
          AUDIO_PATH: ${{ github.event.inputs.audio_path || github.event.client_payload.audio_path }}
          IMAGE_PATHS_JSON: ${{ github.event.inputs.image_paths_json || github.event.client_payload.image_paths_json }}
          SUBTITLE_EVENTS_JSON: ${{ github.event.inputs.subtitle_events_json || github.event.client_payload.subtitle_events_json }}
          VOICE_DURATION_SEC: ${{ github.event.inputs.voice_duration_sec || github.event.client_payload.voice_duration_sec }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request

          base = os.environ['SUPABASE_URL'].rstrip('/')
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          bucket = os.environ['BUCKET']
          audio_path = os.environ['AUDIO_PATH']
          image_paths = json.loads(os.environ['IMAGE_PATHS_JSON'])
          subtitle_events = json.loads(os.environ['SUBTITLE_EVENTS_JSON'])
          voice_duration = max(1.0, float(os.environ.get('VOICE_DURATION_SEC') or 1.0))

          if not image_paths:
            raise SystemExit('image_paths_json must include at least one scene image')

          def dl(remote, local):
            req = urllib.request.Request(
              f"{base}/storage/v1/object/{bucket}/{remote}",
              headers={"apikey": key, "Authorization": f"Bearer {key}"},
            )
            with urllib.request.urlopen(req, timeout=180) as r:
              data = r.read()
            with open(local, 'wb') as f:
              f.write(data)

          dl(audio_path, 'audio.mp3')
          for idx, p in enumerate(image_paths):
            dl(p, f'scene_{idx}.png')

          def srt_ts(v):
            v = max(0.0, float(v))
            h = int(v // 3600)
            m = int((v % 3600) // 60)
            s = int(v % 60)
            ms = int(round((v - int(v)) * 1000))
            if ms >= 1000:
              s += 1
              ms -= 1000
            if s >= 60:
              m += 1
              s -= 60
            if m >= 60:
              h += 1
              m -= 60
            return f"{h:02}:{m:02}:{s:02},{ms:03}"

          events = []
          for ev in subtitle_events:
            start = float(ev.get('start', 0) or 0)
            end = float(ev.get('end', 0) or 0)
            txt = ' '.join(str(ev.get('text', '')).replace('\n', ' ').split())
            if txt:
              events.append((start, end, txt))

          events.sort(key=lambda x: x[0])
          normalized = []
          cursor = 0.0
          for start, end, txt in events:
            start = max(0.0, start, cursor)
            end = max(start + 0.05, end)
            normalized.append((start, end, txt))
            cursor = end

          if not normalized:
            normalized = [(0.0, min(voice_duration, 2.0), 'Stay alert and avoid crypto scams')]

          with open('subtitles.srt', 'w', encoding='utf-8', newline='\n') as f:
            for idx, (start, end, txt) in enumerate(normalized, start=1):
              f.write(f"{idx}\n{srt_ts(start)} --> {srt_ts(end)}\n{txt}\n\n")

          with open('scene_count.txt', 'w', encoding='utf-8') as f:
            f.write(str(len(image_paths)))
          with open('voice_duration_sec.txt', 'w', encoding='utf-8') as f:
            f.write(str(voice_duration))
          PY

      - name: Render MP4 with MoviePy
        run: |
          python3 - <<'PY'
          import os
          from PIL import Image
          from moviepy import ImageSequenceClip, AudioFileClip, CompositeVideoClip, TextClip
          from moviepy.video.tools.subtitles import SubtitlesClip

          W, H = 1080, 1920
          FPS = 30
          SUBTITLE_Y = int(H * 0.56)

          with open('scene_count.txt', 'r', encoding='utf-8') as f:
            scene_count = int(f.read().strip())

          image_paths = [f'scene_{i}.png' for i in range(scene_count)]
          if not image_paths:
            raise SystemExit('No images found for render')

          audio = AudioFileClip('audio.mp3')
          duration = max(1.0, float(audio.duration or 0.0))
          scene_duration = duration / max(1, len(image_paths))

          prepared = []
          for i, p in enumerate(image_paths):
            out = f'prepared_{i}.png'
            with Image.open(p).convert('RGB') as img:
              src_ratio = img.width / img.height
              dst_ratio = W / H
              if src_ratio > dst_ratio:
                new_h = H
                new_w = int(new_h * src_ratio)
              else:
                new_w = W
                new_h = int(new_w / src_ratio)
              resized = img.resize((new_w, new_h), Image.Resampling.LANCZOS)
              left = (new_w - W) // 2
              top = (new_h - H) // 2
              cropped = resized.crop((left, top, left + W, top + H))
              cropped.save(out, 'PNG')
            prepared.append(out)

          video = ImageSequenceClip(prepared, durations=[scene_duration] * len(prepared)).with_audio(audio).with_duration(duration)

          def subtitle_generator(txt: str):
            clean = (txt or '').strip()
            if not clean:
              clean = ' '
            return TextClip(
              text=clean,
              font_size=64,
              color='white',
              stroke_color='black',
              stroke_width=3,
              method='caption',
              size=(860, None)
            ).with_position(('center', SUBTITLE_Y))

          subtitles = SubtitlesClip('subtitles.srt', make_textclip=subtitle_generator)
          final = CompositeVideoClip([video, subtitles.with_duration(duration)], size=(W, H)).with_audio(audio)

          final.write_videofile(
            'render.mp4',
            fps=FPS,
            codec='libx264',
            audio_codec='aac',
            preset='medium',
            threads=4,
            ffmpeg_params=['-pix_fmt', 'yuv420p', '-movflags', '+faststart']
          )
          PY

      - name: Validate output exists
        run: |
          test -s render.mp4

      - name: Upload rendered video to Supabase storage
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || github.event.client_payload.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.supabase_service_role_key || github.event.client_payload.supabase_service_role_key }}
          BUCKET: ${{ github.event.inputs.bucket || github.event.client_payload.bucket }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path || github.event.client_payload.output_path }}
        run: |
          curl -sS --fail-with-body -X POST "${SUPABASE_URL}/storage/v1/object/${BUCKET}/${OUTPUT_PATH}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: video/mp4" \
            --data-binary @render.mp4
