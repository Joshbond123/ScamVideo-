name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN" >&2
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required secret: SUPABASE_PROJECT_REF" >&2
            exit 1
          fi

      - name: Link to Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy edge functions
        run: |
          set -euo pipefail
          mapfile -t function_dirs < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          if [ "${#function_dirs[@]}" -eq 0 ]; then
            echo "No edge functions found in supabase/functions"
            exit 1
          fi

          for fn in "${function_dirs[@]}"; do
            echo "Deploying function: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done
